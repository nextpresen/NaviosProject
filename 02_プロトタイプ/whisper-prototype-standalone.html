<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NaviOs Whisper Prototype</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f0f14; --surface: #1a1a24; --surface-hover: #22222e;
  --border: #2a2a3a; --text: #e8e8f0; --text-secondary: #8888a0;
  --accent: #6c5ce7; --accent-light: #a29bfe; --success: #51cf66;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden;
}
#root { max-width: 430px; margin: 0 auto; min-height: 100vh; position: relative; background: var(--bg); }

.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(15,15,20,0.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border); padding: 12px 16px;
}
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.header-location { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 600; }
.header-location .pin { font-size: 16px; }
.header-people { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
.header-people .dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; display: inline-block; }

.area-chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.area-chips::-webkit-scrollbar { display: none; }
.area-chip {
  flex-shrink: 0; padding: 6px 12px; border-radius: 20px; font-size: 12px;
  border: 1px solid var(--border); background: var(--surface); color: var(--text-secondary);
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.area-chip.active { background: var(--accent); border-color: var(--accent); color: white; }
.area-chip .chip-count { margin-left: 4px; opacity: 0.7; }

.feed { padding: 8px 16px 160px; display: flex; flex-direction: column; gap: 8px; }
.section-label {
  font-size: 11px; color: var(--text-secondary); text-transform: uppercase;
  letter-spacing: 1px; padding: 12px 0 4px; display: flex; align-items: center; gap: 8px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.whisper-card {
  background: var(--surface); border-radius: 12px; padding: 14px;
  transition: opacity 0.3s, transform 0.2s; cursor: pointer;
}
.whisper-card:hover { background: var(--surface-hover); }
.whisper-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.avatar {
  width: 32px; height: 32px; border-radius: 50%; background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 600; color: white; flex-shrink: 0;
}
.whisper-meta { flex: 1; }
.whisper-username { font-size: 13px; font-weight: 600; }
.whisper-time-distance { font-size: 11px; color: var(--text-secondary); display: flex; gap: 8px; }
.whisper-content { font-size: 15px; line-height: 1.5; margin-bottom: 10px; }
.whisper-footer { display: flex; align-items: center; justify-content: space-between; }
.whisper-reactions { display: flex; gap: 6px; flex-wrap: wrap; }
.reaction-badge {
  display: flex; align-items: center; gap: 3px; padding: 3px 8px; border-radius: 12px;
  font-size: 12px; background: rgba(108,92,231,0.15); color: var(--accent-light);
  border: none; cursor: pointer; transition: background 0.2s;
}
.reaction-badge:hover { background: rgba(108,92,231,0.3); }
.whisper-reply-count { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }

.reply-thread { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
.reply-item { display: flex; gap: 8px; padding-left: 8px; }
.reply-avatar { width: 24px; height: 24px; font-size: 11px; }
.reply-body { flex: 1; }
.reply-username { font-size: 12px; font-weight: 600; margin-right: 6px; }
.reply-text { font-size: 13px; line-height: 1.4; }
.reply-time { font-size: 10px; color: var(--text-secondary); margin-top: 2px; }

.compose-bar {
  position: fixed; bottom: 48px; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px; padding: 12px 16px;
  background: rgba(15,15,20,0.95); backdrop-filter: blur(12px);
  border-top: 1px solid var(--border); z-index: 100;
}
.compose-inner { display: flex; gap: 8px; align-items: center; }
.compose-input {
  flex: 1; padding: 10px 14px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); font-size: 14px; outline: none;
  font-family: inherit; transition: border-color 0.2s;
}
.compose-input:focus { border-color: var(--accent); }
.compose-input::placeholder { color: var(--text-secondary); }
.compose-btn {
  width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--accent);
  color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center;
  justify-content: center; transition: opacity 0.2s; flex-shrink: 0;
}
.compose-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200;
  display: flex; align-items: flex-end; justify-content: center;
}
.modal-content {
  background: var(--surface); width: 100%; max-width: 430px; max-height: 85vh;
  border-radius: 16px 16px 0 0; padding: 20px 16px; overflow-y: auto;
  animation: slideUp 0.25s ease-out;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 0 auto 16px; }

.reaction-picker { display: flex; gap: 8px; padding: 12px 0; justify-content: center; flex-wrap: wrap; }
.reaction-picker-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 8px 12px; border-radius: 12px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); cursor: pointer; font-size: 20px;
  transition: all 0.2s;
}
.reaction-picker-btn:hover { background: var(--surface-hover); border-color: var(--accent); }
.reaction-picker-btn .label { font-size: 10px; color: var(--text-secondary); }

.expiry-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
.expiry-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s; }

.empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state p { font-size: 14px; line-height: 1.6; }

.toast {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
  background: var(--accent); color: white; padding: 10px 20px; border-radius: 20px;
  font-size: 13px; z-index: 300; animation: fadeInOut 2s ease-in-out; pointer-events: none;
}
@keyframes fadeInOut {
  0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
  15% { opacity: 1; transform: translateX(-50%) translateY(0); }
  80% { opacity: 1; } 100% { opacity: 0; }
}

.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px; display: flex;
  background: rgba(15,15,20,0.95); backdrop-filter: blur(12px);
  border-top: 1px solid var(--border); z-index: 90;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 8px 0 6px; border: none; background: none; color: var(--text-secondary);
  font-size: 10px; cursor: pointer; transition: color 0.2s;
}
.nav-item.active { color: var(--accent-light); }
.nav-item .nav-icon { font-size: 20px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useCallback } = React;

// ============================================================
// Mock Data
// ============================================================

const MOCK_USERS = [
  { id: "u1", username: "たかし", avatarUrl: null },
  { id: "u2", username: "ゆきこ", avatarUrl: null },
  { id: "u3", username: "けんた", avatarUrl: null },
  { id: "u4", username: "さくら", avatarUrl: null },
  { id: "u5", username: "まさお", avatarUrl: null },
  { id: "u6", username: "あいこ", avatarUrl: null },
  { id: "u7", username: "りょう", avatarUrl: null },
  { id: "u8", username: "みほ", avatarUrl: null },
  { id: "u9", username: "だいき", avatarUrl: null },
  { id: "u10", username: "ことね", avatarUrl: null },
];

const CURRENT_LOCATION = { latitude: 35.6581, longitude: 139.7017 };

const MOCK_AREAS = [
  { id: "area1", name: "渋谷駅前", latitude: 35.6581, longitude: 139.7017, radiusMeters: 300, activeUserCount: 24, whisperCount: 8 },
  { id: "area2", name: "宮益坂エリア", latitude: 35.6595, longitude: 139.7045, radiusMeters: 200, activeUserCount: 9, whisperCount: 4 },
  { id: "area3", name: "センター街", latitude: 35.6595, longitude: 139.6988, radiusMeters: 200, activeUserCount: 31, whisperCount: 12 },
  { id: "area4", name: "代々木公園", latitude: 35.6715, longitude: 139.6948, radiusMeters: 500, activeUserCount: 15, whisperCount: 6 },
];

const now = new Date();
const hoursAgo = (h) => new Date(now.getTime() - h * 60 * 60 * 1000).toISOString();
const hoursLater = (h) => new Date(now.getTime() + h * 60 * 60 * 1000).toISOString();

const INITIAL_WHISPERS = [
  { id: "w1", user: MOCK_USERS[0], content: "ハチ公前めっちゃ人いる。待ち合わせの人は東口の方がいいかも", latitude: 35.6580, longitude: 139.7015, areaName: "渋谷駅前", distanceMeters: 30, createdAt: hoursAgo(0.5), expiresAt: hoursLater(23.5), replyCount: 3, reactionCount: 8, reactions: [{ type: "useful", count: 5 }, { type: "thanks", count: 3 }] },
  { id: "w2", user: MOCK_USERS[1], content: "駅前のスタバ、今なら空いてるよ〜", latitude: 35.6583, longitude: 139.7020, areaName: "渋谷駅前", distanceMeters: 50, createdAt: hoursAgo(1), expiresAt: hoursLater(23), replyCount: 1, reactionCount: 4, reactions: [{ type: "wantToGo", count: 3 }, { type: "thanks", count: 1 }] },
  { id: "w3", user: MOCK_USERS[2], content: "109の前でストリートライブやってる！うまい", latitude: 35.6590, longitude: 139.7005, areaName: "渋谷駅前", distanceMeters: 80, createdAt: hoursAgo(0.2), expiresAt: hoursLater(23.8), replyCount: 5, reactionCount: 12, reactions: [{ type: "wantToGo", count: 7 }, { type: "funny", count: 3 }, { type: "agree", count: 2 }] },
  { id: "w4", user: MOCK_USERS[3], content: "宮益坂のパン屋、今日クロワッサン焼きたて出してる", latitude: 35.6593, longitude: 139.7040, areaName: "宮益坂エリア", distanceMeters: 150, createdAt: hoursAgo(2), expiresAt: hoursLater(22), replyCount: 2, reactionCount: 6, reactions: [{ type: "wantToGo", count: 4 }, { type: "useful", count: 2 }] },
  { id: "w5", user: MOCK_USERS[4], content: "この辺でランチおすすめある？和食がいいな", latitude: 35.6598, longitude: 139.7035, areaName: "宮益坂エリア", distanceMeters: 200, createdAt: hoursAgo(1.5), expiresAt: hoursLater(22.5), replyCount: 4, reactionCount: 2, reactions: [{ type: "agree", count: 2 }] },
  { id: "w6", user: MOCK_USERS[5], content: "センター街の古着屋セールやってる！50%オフ", latitude: 35.6600, longitude: 139.6985, areaName: "センター街", distanceMeters: 300, createdAt: hoursAgo(3), expiresAt: hoursLater(21), replyCount: 7, reactionCount: 15, reactions: [{ type: "wantToGo", count: 9 }, { type: "useful", count: 4 }, { type: "thanks", count: 2 }] },
  { id: "w7", user: MOCK_USERS[6], content: "タピオカの新しい店できてるけど行列やば", latitude: 35.6598, longitude: 139.6990, areaName: "センター街", distanceMeters: 350, createdAt: hoursAgo(4), expiresAt: hoursLater(20), replyCount: 2, reactionCount: 5, reactions: [{ type: "funny", count: 3 }, { type: "agree", count: 2 }] },
  { id: "w8", user: MOCK_USERS[7], content: "代々木公園の桜、三分咲きくらい。来週が見頃かも", latitude: 35.6710, longitude: 139.6945, areaName: "代々木公園", distanceMeters: 1500, createdAt: hoursAgo(5), expiresAt: hoursLater(19), replyCount: 8, reactionCount: 22, reactions: [{ type: "wantToGo", count: 14 }, { type: "useful", count: 5 }, { type: "thanks", count: 3 }] },
  { id: "w9", user: MOCK_USERS[8], content: "公園のベンチ、噴水の裏側が空いてるよ", latitude: 35.6720, longitude: 139.6950, areaName: "代々木公園", distanceMeters: 1600, createdAt: hoursAgo(6), expiresAt: hoursLater(18), replyCount: 0, reactionCount: 3, reactions: [{ type: "thanks", count: 2 }, { type: "useful", count: 1 }] },
  { id: "w10", user: MOCK_USERS[9], content: "渋谷駅の工事、南口あたり通りにくくなってる", latitude: 35.6578, longitude: 139.7018, areaName: "渋谷駅前", distanceMeters: 40, createdAt: hoursAgo(22), expiresAt: hoursLater(2), replyCount: 6, reactionCount: 18, reactions: [{ type: "useful", count: 10 }, { type: "thanks", count: 5 }, { type: "agree", count: 3 }] },
];

const MOCK_REPLIES = [
  { id: "r1", whisperId: "w1", user: MOCK_USERS[3], content: "東口のモヤイ像前が穴場だよ", createdAt: hoursAgo(0.4) },
  { id: "r2", whisperId: "w1", user: MOCK_USERS[5], content: "ハチ公前、外国人観光客でいつも混んでるよね", createdAt: hoursAgo(0.3) },
  { id: "r3", whisperId: "w1", user: MOCK_USERS[8], content: "ありがとう！東口にします", createdAt: hoursAgo(0.1) },
];

const REACTION_CONFIG = {
  thanks: { label: "ありがとう", emoji: "\u{1F64F}" },
  useful: { label: "助かった", emoji: "\u{1F44D}" },
  wantToGo: { label: "行きたい", emoji: "\u{1F3C3}" },
  funny: { label: "笑", emoji: "\u{1F602}" },
  agree: { label: "わかる", emoji: "\u{1F4A1}" },
};

function calcWhisperOpacity(whisper) {
  const maxDistance = 500;
  const distanceRatio = Math.min(whisper.distanceMeters / maxDistance, 1);
  const distanceOpacity = 1 - distanceRatio * 0.85;
  const createdTime = new Date(whisper.createdAt).getTime();
  const expiresTime = new Date(whisper.expiresAt).getTime();
  const nowTime = Date.now();
  const totalLifespan = expiresTime - createdTime;
  const elapsed = nowTime - createdTime;
  const timeRatio = Math.min(elapsed / totalLifespan, 1);
  const timeOpacity = 1 - timeRatio * 0.7;
  return Math.max(0, distanceOpacity * timeOpacity);
}

// ============================================================
// Utilities
// ============================================================

function timeAgo(isoStr) {
  const diff = Date.now() - new Date(isoStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return "たった今";
  if (mins < 60) return mins + "分前";
  const hours = Math.floor(mins / 60);
  if (hours < 24) return hours + "時間前";
  return Math.floor(hours / 24) + "日前";
}

function formatDistance(m) {
  if (m < 1000) return m + "m";
  return (m / 1000).toFixed(1) + "km";
}

function remainingPercent(whisper) {
  const created = new Date(whisper.createdAt).getTime();
  const expires = new Date(whisper.expiresAt).getTime();
  const total = expires - created;
  const remaining = expires - Date.now();
  return Math.max(0, Math.min(100, (remaining / total) * 100));
}

function getInitial(name) { return name.charAt(0); }

// ============================================================
// Components
// ============================================================

function WhisperCard({ whisper, onClick, replies }) {
  const opacity = calcWhisperOpacity(whisper);
  const remaining = remainingPercent(whisper);

  return (
    <div className="whisper-card" style={{ opacity: Math.max(0.15, opacity) }} onClick={onClick}>
      <div className="whisper-header">
        <div className="avatar">{getInitial(whisper.user.username)}</div>
        <div className="whisper-meta">
          <div className="whisper-username">{whisper.user.username}</div>
          <div className="whisper-time-distance">
            <span>{timeAgo(whisper.createdAt)}</span>
            <span>{formatDistance(whisper.distanceMeters)}</span>
            <span>{whisper.areaName}</span>
          </div>
        </div>
      </div>
      <div className="whisper-content">{whisper.content}</div>
      <div className="whisper-footer">
        <div className="whisper-reactions">
          {whisper.reactions.map((r) => (
            <span key={r.type} className="reaction-badge">
              {REACTION_CONFIG[r.type].emoji} {r.count}
            </span>
          ))}
        </div>
        {whisper.replyCount > 0 && (
          <div className="whisper-reply-count">
            {"\u{1F4AC}"} {whisper.replyCount}
          </div>
        )}
      </div>
      <div className="expiry-bar">
        <div className="expiry-fill" style={{ width: remaining + "%" }} />
      </div>
      {replies && replies.length > 0 && (
        <div className="reply-thread">
          {replies.map((r) => (
            <div key={r.id} className="reply-item">
              <div className="avatar reply-avatar">{getInitial(r.user.username)}</div>
              <div className="reply-body">
                <span className="reply-username">{r.user.username}</span>
                <span className="reply-text">{r.content}</span>
                <div className="reply-time">{timeAgo(r.createdAt)}</div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function DetailModal({ whisper, replies, onClose, onReact }) {
  const [replyText, setReplyText] = useState("");
  const remaining = remainingPercent(whisper);

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-content" onClick={(e) => e.stopPropagation()}>
        <div className="modal-handle" />
        <div className="whisper-header">
          <div className="avatar">{getInitial(whisper.user.username)}</div>
          <div className="whisper-meta">
            <div className="whisper-username">{whisper.user.username}</div>
            <div className="whisper-time-distance">
              <span>{timeAgo(whisper.createdAt)}</span>
              <span>{formatDistance(whisper.distanceMeters)}</span>
              <span>{whisper.areaName}</span>
            </div>
          </div>
        </div>
        <div className="whisper-content" style={{ fontSize: 17, margin: "12px 0" }}>
          {whisper.content}
        </div>
        <div className="expiry-bar" style={{ marginBottom: 16 }}>
          <div className="expiry-fill" style={{ width: remaining + "%" }} />
        </div>
        <div className="reaction-picker">
          {Object.keys(REACTION_CONFIG).map((type) => (
            <button key={type} className="reaction-picker-btn" onClick={() => onReact(type)}>
              {REACTION_CONFIG[type].emoji}
              <span className="label">{REACTION_CONFIG[type].label}</span>
            </button>
          ))}
        </div>
        <div className="reply-thread" style={{ borderTop: "1px solid var(--border)", paddingTop: 12 }}>
          <div style={{ fontSize: 13, color: "var(--text-secondary)", marginBottom: 8 }}>
            返信 ({replies.length})
          </div>
          {replies.map((r) => (
            <div key={r.id} className="reply-item">
              <div className="avatar reply-avatar">{getInitial(r.user.username)}</div>
              <div className="reply-body">
                <span className="reply-username">{r.user.username}</span>
                <span className="reply-text">{r.content}</span>
                <div className="reply-time">{timeAgo(r.createdAt)}</div>
              </div>
            </div>
          ))}
          {replies.length === 0 && (
            <div style={{ fontSize: 13, color: "var(--text-secondary)", textAlign: "center", padding: 16 }}>
              まだ返信はありません
            </div>
          )}
        </div>
        <div className="compose-inner" style={{ marginTop: 12 }}>
          <input className="compose-input" placeholder="返信する..." value={replyText} onChange={(e) => setReplyText(e.target.value)} />
          <button className="compose-btn" disabled={!replyText.trim()}>↑</button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// App
// ============================================================

function App() {
  const [selectedArea, setSelectedArea] = useState(null);
  const [selectedWhisper, setSelectedWhisper] = useState(null);
  const [composeText, setComposeText] = useState("");
  const [toast, setToast] = useState(null);
  const [whispers, setWhispers] = useState(INITIAL_WHISPERS);

  const showToast = useCallback((msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2000);
  }, []);

  const filteredWhispers = useMemo(() => {
    let items = [...whispers];
    if (selectedArea) {
      const area = MOCK_AREAS.find((a) => a.id === selectedArea);
      if (area) items = items.filter((w) => w.areaName === area.name);
    }
    return items.sort((a, b) => new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime());
  }, [whispers, selectedArea]);

  const groupedWhispers = useMemo(() => {
    const near = [], mid = [], far = [];
    for (const w of filteredWhispers) {
      if (w.distanceMeters <= 100) near.push(w);
      else if (w.distanceMeters <= 400) mid.push(w);
      else far.push(w);
    }
    return { near, mid, far };
  }, [filteredWhispers]);

  const totalUsers = MOCK_AREAS.reduce((s, a) => s + a.activeUserCount, 0);

  const handleCompose = () => {
    if (!composeText.trim()) return;
    const newWhisper = {
      id: "w-new-" + Date.now(), user: MOCK_USERS[0], content: composeText.trim(),
      latitude: CURRENT_LOCATION.latitude, longitude: CURRENT_LOCATION.longitude,
      areaName: "渋谷駅前", distanceMeters: 0,
      createdAt: new Date().toISOString(),
      expiresAt: new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString(),
      replyCount: 0, reactionCount: 0, reactions: [],
    };
    setWhispers((prev) => [newWhisper, ...prev]);
    setComposeText("");
    showToast("つぶやきました");
  };

  const handleReact = (type) => {
    if (!selectedWhisper) return;
    setWhispers((prev) =>
      prev.map((w) => {
        if (w.id !== selectedWhisper.id) return w;
        const existing = w.reactions.find((r) => r.type === type);
        const reactions = existing
          ? w.reactions.map((r) => r.type === type ? { ...r, count: r.count + 1 } : r)
          : [...w.reactions, { type, count: 1 }];
        return { ...w, reactions, reactionCount: w.reactionCount + 1 };
      })
    );
    showToast(REACTION_CONFIG[type].emoji + " " + REACTION_CONFIG[type].label);
    setSelectedWhisper(null);
  };

  const repliesForSelected = selectedWhisper
    ? MOCK_REPLIES.filter((r) => r.whisperId === selectedWhisper.id)
    : [];

  return (
    <React.Fragment>
      <div className="header">
        <div className="header-top">
          <div className="header-location">
            <span className="pin">{"\u{1F4CD}"}</span> 渋谷駅周辺
          </div>
          <div className="header-people">
            <span className="dot" /> {totalUsers}人がこの近くにいます
          </div>
        </div>
        <div className="area-chips">
          <button className={"area-chip" + (!selectedArea ? " active" : "")} onClick={() => setSelectedArea(null)}>すべて</button>
          {MOCK_AREAS.map((area) => (
            <button key={area.id} className={"area-chip" + (selectedArea === area.id ? " active" : "")} onClick={() => setSelectedArea(area.id)}>
              {area.name}<span className="chip-count">{area.whisperCount}</span>
            </button>
          ))}
        </div>
      </div>

      <div className="feed">
        {filteredWhispers.length === 0 ? (
          <div className="empty-state">
            <div className="icon">{"\u{1F92B}"}</div>
            <p>このエリアにはまだつぶやきがありません。<br />最初のつぶやきを投稿してみましょう!</p>
          </div>
        ) : (
          <React.Fragment>
            {groupedWhispers.near.length > 0 && (
              <React.Fragment>
                <div className="section-label">{"\u{1F4CD}"} 今いるエリア</div>
                {groupedWhispers.near.map((w) => (
                  <WhisperCard key={w.id} whisper={w} onClick={() => setSelectedWhisper(w)}
                    replies={w.id === "w1" ? MOCK_REPLIES.filter((r) => r.whisperId === "w1") : undefined} />
                ))}
              </React.Fragment>
            )}
            {groupedWhispers.mid.length > 0 && (
              <React.Fragment>
                <div className="section-label">{"\u{1F6B6}"} 近くのエリア</div>
                {groupedWhispers.mid.map((w) => (
                  <WhisperCard key={w.id} whisper={w} onClick={() => setSelectedWhisper(w)} />
                ))}
              </React.Fragment>
            )}
            {groupedWhispers.far.length > 0 && (
              <React.Fragment>
                <div className="section-label">{"\u{1F319}"} さっきいた場所</div>
                {groupedWhispers.far.map((w) => (
                  <WhisperCard key={w.id} whisper={w} onClick={() => setSelectedWhisper(w)} />
                ))}
              </React.Fragment>
            )}
          </React.Fragment>
        )}
      </div>

      <div className="compose-bar">
        <div className="compose-inner">
          <input className="compose-input" placeholder="つぶやく..." value={composeText}
            onChange={(e) => setComposeText(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && handleCompose()} />
          <button className="compose-btn" disabled={!composeText.trim()} onClick={handleCompose}>↑</button>
        </div>
      </div>

      <div className="bottom-nav">
        <button className="nav-item"><span className="nav-icon">{"\u{1F50D}"}</span>Pulse</button>
        <button className="nav-item"><span className="nav-icon">{"\u{1F5FA}\u{FE0F}"}</span>Nearby</button>
        <button className="nav-item active"><span className="nav-icon">{"\u{1F92B}"}</span>Whisper</button>
        <button className="nav-item"><span className="nav-icon">{"\u{1F4CB}"}</span>Timeline</button>
        <button className="nav-item"><span className="nav-icon">{"\u{1F464}"}</span>Profile</button>
      </div>

      {selectedWhisper && (
        <DetailModal whisper={selectedWhisper} replies={repliesForSelected}
          onClose={() => setSelectedWhisper(null)} onReact={handleReact} />
      )}

      {toast && <div className="toast">{toast}</div>}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(React.StrictMode, null, React.createElement(App))
);
</script>
</body>
</html>
